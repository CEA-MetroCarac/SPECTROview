site_name: SPECTROview Documentation
site_description: A Tool for Spectroscopic Data Processing and Visualization
site_author: Van Hoan Le
site_url: https://CEA-MetroCarac.github.io/SPECTROview/

repo_url: https://github.com/CEA-MetroCarac/SPECTROview
repo_name: CEA-MetroCarac/SPECTROview

copyright: Copyright &copy; 2024-2026 CEA-Leti / Van Hoan Le

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: red
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/icon.png
  favicon: assets/icon.png

nav:
  - Home: index.md
  - User Manual:
    - Table of contents: user_manual/index.md
    - Introduction: user_manual/01_introduction.md
    - Installation: user_manual/02_installation.md
    - Supported Data: user_manual/03_supported_data.md
    - UI Overview: user_manual/04_ui_overview.md
    - Spectra & Maps Workspace: user_manual/05_spectra_maps.md
    - Graphs Workspace: user_manual/06_graphs.md
    - Tensor Fit Engine: user_manual/07_tensor_fit.md
    - Multivariate Analysis (MVA): user_manual/08_mva.md
    - Quick Calculators: user_manual/09_calculators.md
    - Settings: user_manual/10_settings.md
    - Save & Load: user_manual/11_save_load.md
    - Shortcuts & Tips: user_manual/12_shortcuts.md
  - Developer Guide:
    - Architecture: developer/index.md
    - Tensor Fit Engine: developer/tensor-engine.md
    - Multivariate Analysis (MVA): developer/mva.md
  - Changelog: changelog.md

hooks:
  - docs/docs_hooks.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CEA-MetroCarac/SPECTROview
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/spectroview/

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
