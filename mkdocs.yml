site_name: SPECTROview Documentation
site_description: A Tool for Spectroscopic Data Processing and Visualization
site_author: Van Hoan Le
site_url: https://CEA-MetroCarac.github.io/SPECTROview/

repo_url: https://github.com/CEA-MetroCarac/SPECTROview
repo_name: CEA-MetroCarac/SPECTROview

copyright: Copyright &copy; 2024-2026 CEA-Leti / Van Hoan Le

theme:
  name: material
  custom_dir: docs/overrides
  font:
    text: Roboto
    code: Fira Code
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - toc.integrate
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github
  logo: assets/icon.png
  favicon: assets/icon.png

nav:
  - Home: index.md
  - Installation: user_manual/installation.md
  - User Manual:
    - Home: user_manual/index.md
    - Supported Data: user_manual/supported_data.md
    - UI Overview: user_manual/ui_overview.md
    - Menu Bar: user_manual/menu_bar.md
    - Workspace Spectra & Maps: user_manual/spectra_maps.md
    - Workspace Graphs: user_manual/graphs.md
    - Multivariate Analysis (MVA): user_manual/mva.md
    - Quick Calculators: user_manual/calculators.md
    - Settings: user_manual/settings.md
    - Save & Load: user_manual/save_load.md
    - Shortcuts & Tips: user_manual/shortcuts.md
  - AI Agent: user_manual/ai_agent.md
  - Developer Guide:
    - Architecture: developer/index.md
    - File Loading Pipeline: developer/file_loading.md
    - Data Architecture SpectraStore: developer/spectra_store.md
    - Workspace Spectra: developer/spectra.md
    - Workspace Maps: developer/maps.md
    - Workspace Graphs: developer/graphs.md
    - Vectorized Batch Fit Engine (VBF): developer/vbf_engine.md
    - Multivariate Analysis (MVA): developer/mva.md
    - AI Agent: developer/ai_agent.md
  
  - API:
    - Home: api/index.md
    - Spectra Workspace (load, preprocess, fit): api/spectra.md
    - Maps Workspace (hyperspectral, heatmaps): api/2dmap.md
    - Data Visualization (Graphs): api/graphs.md
    - Quick Calculators: api/calculators.md
    - Extending SPECTROview: api/extending.md
  - Changelog: changelog.md

hooks:
  - docs/docs_hooks.py

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 4

plugins:
  - search

extra:
  analytics:
    provider: google
    property: G-N8XYNZ7WFC
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/CEA-MetroCarac/SPECTROview
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/spectroview/

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
