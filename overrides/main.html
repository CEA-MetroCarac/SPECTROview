{% extends "base.html" %}

{% block tabs %}
  {{ super() }}
  
  {% if page and (page.url == "" or page.url.startswith("user_manual")) %}
    <style>
      /* Hide the default H1 title injected by MkDocs */
      .md-content h1 { display: none !important; }
    </style>
  {% endif %}
  
  {% if page and page.url == "" %}
    <section class="tx-hero">
      <div class="tx-hero__image">
        <img src="assets/top_banner.png" alt="SPECTROview Banner" style="width: 100%; display: block; max-width: 1200px; margin: 0 auto; padding-top: 2rem;" />
      </div>
      <div class="md-grid md-typeset">
        <div class="tx-hero__content">
          <h1 style="display: none;">SPECTROview</h1>
          <a href="user_manual/" title="User Manual" class="md-button md-button--primary">
            Get Started
          </a>
          <a href="{{ config.repo_url }}" title="GitHub Repository" class="md-button">
            View on GitHub
          </a>
          <a href="https://pypi.org/project/spectroview/" title="PyPi Package" class="md-button">
            View on PyPi
          </a>
        </div>
      </div>
    </section>
  {% endif %}
{% endblock %}
