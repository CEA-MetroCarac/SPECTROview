# SPECTROview AI Agent — Model Configuration Defaults
#
# This file defines default LLM model settings for the AI Agent.
# These are developer-facing defaults only. They do NOT override
# runtime settings (API keys, selected provider/model) stored in
# QSettings. Runtime settings set via the application Settings dialog
# always take precedence.
#
# Purpose: provide version-controllable, reviewable defaults that are
# read once at PromptManager initialisation and applied when no
# runtime value has been set by the user.

# ---------------------------------------------------------------------------
# Provider selection
# ---------------------------------------------------------------------------
# Default LLM provider when none is configured at runtime.
# Valid values: Ollama | OpenAI | Gemini | DeepSeek | Anthropic | Custom
default_provider: Ollama

# Default model name sent to the provider.
# For Ollama: model name as listed by `ollama list` (e.g., qwen2.5-coder:7b)
# For OpenAI: model ID (e.g., gpt-4o-mini)
# For Gemini: model ID (e.g., gemini-1.5-flash)
# For Anthropic: model ID (e.g., claude-3-haiku-20240307)
default_model: qwen2.5-coder:7b

# ---------------------------------------------------------------------------
# Generation limits
# ---------------------------------------------------------------------------
# Maximum number of tokens the model may generate in a single response.
# Increase if you experience truncated responses.
max_tokens: 81920

# Same, but applied when small-model mode is active (see below) — bounds
# worst-case runaway generation on weaker local models.
max_tokens_small: 4096

# ---------------------------------------------------------------------------
# Context management
# ---------------------------------------------------------------------------
# Maximum number of past conversation messages to include in each API call.
# null = no cap (all messages are sent, limited only by the provider's context window).
max_context_messages: null

# Same, but applied when small-model mode is active — keeps the prompt small
# enough for a local model's context window and generation speed.
max_context_messages_small: 6

# Timeout in seconds for a single LLM API call.
# Set to null for no timeout (not recommended for production use).
request_timeout_seconds: 120

# ---------------------------------------------------------------------------
# Small-model mode (local Ollama models only)
# ---------------------------------------------------------------------------
# Ollama context window (num_ctx) used for regular/full-prompt requests.
ollama_num_ctx_full: 16384

# Ollama context window (num_ctx) used when small-model mode is active.
ollama_num_ctx_small: 8192

# Controls Ollama's "thinking" mode for hybrid-reasoning models (e.g. qwen3).
# false = disabled (recommended — keeps the model committing to tool calls
# instead of spending its budget on unmanaged deliberation).
# true, or "low"/"medium"/"high", enables it.
ollama_think: false

# A local Ollama model is auto-classified as "small" when its reported
# parameter count (from `ollama show`) is below this many billions.
small_model_param_threshold_b: 10.0

# Above this many columns, a DataFrame's column list in the system prompt
# is compacted (grouped by shared name prefix) to save tokens. No column
# NAME is ever hidden — only per-column sample-value detail is compacted.
column_detail_threshold: 30
